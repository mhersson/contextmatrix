name: Nightly Race Check

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  race-full:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test -race
        run: go test -race ./...
